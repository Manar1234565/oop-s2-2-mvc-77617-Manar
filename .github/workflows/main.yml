name: Test & Publish Coverage (xUnit + ReportGenerator)
on:
  workflow_dispatch: 
  push:
    branches: [ master, main ]
  pull_request:
concurrency:
  group: "pages"
  cancel-in-progress: true
permissions:
  contents: read
  pages: write
  id-token: write
env:
  DOTNET_VERSION: "8.0.x"
  TEST_PROJECT: "FoodSafetyTracker.Tests/FoodSafetyTracker.Tests.csproj"
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT }} -c Release --verbosity normal
